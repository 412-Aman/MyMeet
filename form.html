<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendee Form | MyMeet</title>
  <meta name="description" content="Event check-in and registration form powered by MyMeet.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages.css">
  <script>try{const p=JSON.parse(localStorage.getItem('mm_prefs')||'{}');if(p.theme==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.background='#0a0a0a';}}catch(e){}</script>
  <style>
    /* ── Identifier field highlight ── */
    .identifier-field-wrap {
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px 18px 14px;
      margin-bottom: 20px;
      background: color-mix(in srgb, var(--accent) 6%, transparent);
      position: relative;
    }
    .identifier-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border-radius: 99px;
      padding: 3px 9px;
      margin-bottom: 8px;
    }
    .identifier-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }
    .form-page-wrap {
      min-height: 100vh;
      padding: 0 0 60px;
    }
    .form-hero {
      padding: 40px 24px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .form-hero h1 {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .form-body {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .form-success-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .success-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--success) 15%, transparent);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }
  </style>
</head>
<body>
<script>document.addEventListener('DOMContentLoaded',()=>document.body.classList.add('page-ready'));</script>

  <div class="form-page-wrap" id="form-page">
    <!-- Populated by JS -->
  </div>

  <div class="toast-container" id="toasts"></div>

  <script src="scripts/storage.js"></script>
  <script>
    const S = Storage.sanitize;

    function toast(msg, type = '') {
      const c = document.getElementById('toasts');
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    const params = new URLSearchParams(location.search);
    const eventId = parseInt(params.get('eid'));
    const ev = Storage.getEvent(eventId);
    const page = document.getElementById('form-page');

    if (!ev) {
      page.innerHTML = `
        <div class="form-hero">
          <div style="margin-bottom:20px">
            <img src="background_removed.png" alt="MyMeet" style="height:36px;width:auto;display:block;margin:0 auto">
          </div>
          <h1>Form Not Found</h1>
          <p style="color:var(--text-soft)">This event form isn't available. The link may be incorrect or the event was removed.</p>
        </div>`;
    } else {
      const fields = ev.fieldsSnapshot?.length ? ev.fieldsSnapshot : Storage.getFields();
      const dateStr = ev.date ? new Date(ev.date).toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) : '';
      const timeStr = ev.date ? new Date(ev.date).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '';
      const hasIdentifier = ev.customIdentifier?.label;

      if (!fields.length && !hasIdentifier) {
        page.innerHTML = `
          <div class="form-hero">
            <div style="margin-bottom:20px"><img src="background_removed.png" alt="MyMeet" style="height:36px;width:auto;display:block;margin:0 auto"></div>
            <h1>${S(ev.title)}</h1>
            <p>No form fields have been set up for this event yet.</p>
          </div>`;
      } else {
        // Category label map
        const catLabels = {
          'career-fair': 'Career Fair', 'job-fair': 'Job Fair', 'workshop': 'Workshop',
          'networking': 'Networking', 'conference': 'Conference', 'meetup': 'Meetup',
          'school-club': 'School Club', 'corporate-event': 'Corporate Event',
          'seminar': 'Seminar', 'hackathon': 'Hackathon', 'social': 'Social', 'other': 'Other'
        };
        const catLabel = ev.category ? (catLabels[ev.category] || ev.category) : '';

        page.innerHTML = `
          <div class="form-hero">
            <div style="margin-bottom:20px">
              <img src="background_removed.png" alt="MyMeet" style="height:36px;width:auto;display:block;margin:0 auto">
            </div>
            ${catLabel ? `<div style="margin-bottom:10px"><span class="badge badge-default" style="font-size:11px">${S(catLabel)}</span></div>` : ''}
            <h1>${S(ev.title)}</h1>
            <p style="color:var(--text-soft);margin-top:6px">
              ${dateStr ? S(dateStr) + (timeStr ? ' · ' + timeStr : '') : ''}
              ${ev.location?.type === 'inperson' && ev.location.name ? ' · ' + S(ev.location.name) : ''}
            </p>
            ${ev.desc ? `<p style="margin-top:10px;font-size:14px;color:var(--text-muted);max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6">${S(ev.desc)}</p>` : ''}
          </div>

          <div class="form-body">
            <div class="card">
              <h3 style="margin-bottom:4px">Attendee Information</h3>
              <p class="text-sm text-muted" style="margin-bottom:24px">Please fill out all required fields to complete your registration.</p>

              <form id="attendee-form" onsubmit="submitForm(event)">

                ${hasIdentifier ? `
                  <div class="identifier-field-wrap">
                    <div class="identifier-badge">Member Identifier</div>
                    <label class="form-label" style="margin-bottom:8px">${S(ev.customIdentifier.label)}${ev.customIdentifier.required ? ' *' : ''}</label>
                    <input
                      class="form-input"
                      name="identifier"
                      type="text"
                      placeholder="Enter your ${S(ev.customIdentifier.label.toLowerCase())}"
                      ${ev.customIdentifier.required ? 'required' : ''}
                      maxlength="200"
                      autocomplete="off"
                      style="font-family:'SF Mono',monospace;letter-spacing:.03em"
                    >
                  </div>
                ` : ''}

                ${fields.map((f, i) => `
                  <div class="form-group">
                    <label class="form-label">${S(f.name)} *</label>
                    ${f.type === 'select' ? `
                      <select class="form-input" name="field_${i}" required>
                        <option value="">Select...</option>
                        ${(f.options || []).map(o => `<option value="${S(o)}">${S(o)}</option>`).join('')}
                      </select>
                    ` : f.type === 'email' ? `
                      <input class="form-input" name="field_${i}" type="email" placeholder="your@email.com" required>
                    ` : f.type === 'phone' ? `
                      <input class="form-input" name="field_${i}" type="tel" placeholder="+1 (555) 123 4567" required>
                    ` : f.type === 'number' ? `
                      <input class="form-input" name="field_${i}" type="number" placeholder="Enter a number" required>
                    ` : `
                      <input class="form-input" name="field_${i}" type="text" placeholder="Enter ${S(f.name.toLowerCase())}" required maxlength="500">
                    `}
                  </div>
                `).join('')}

                <div class="form-submit-area">
                  <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">Submit Registration</button>
                </div>
              </form>
            </div>

            <!-- Success state -->
            <div id="form-success" style="display:none">
              <div class="card" style="text-align:center;padding:48px 32px">
                <div class="success-icon">✓</div>
                <h3 style="margin-bottom:8px">You're registered!</h3>
                <p class="text-muted">Your information has been recorded for <strong>${S(ev.title)}</strong>.</p>
                ${hasIdentifier ? `<p class="text-sm text-muted" style="margin-top:8px" id="success-id-echo"></p>` : ''}
                <button class="btn btn-secondary" style="margin-top:20px" onclick="resetForm()">Submit Another Response</button>
              </div>
            </div>

            <div style="text-align:center;margin-top:24px;padding-bottom:12px">
              <p class="text-xs text-muted">Powered by <strong>MyMeet</strong> · Career Fairs / Workshops / Meetups / School Clubs / Corporate Events</p>
            </div>
          </div>
        `;
      }
    }

    function submitForm(e) {
      e.preventDefault();
      const form = document.getElementById('attendee-form');
      const formData = new FormData(form);
      const fields = ev.fieldsSnapshot?.length ? ev.fieldsSnapshot : Storage.getFields();
      const response = {};
      let hasError = false;

      // Handle custom identifier
      if (ev.customIdentifier?.label) {
        const idVal = (formData.get('identifier') || '').trim();
        if (ev.customIdentifier.required && !idVal) {
          toast(ev.customIdentifier.label + ' is required', 'error');
          return;
        }
        if (idVal.length > 200) {
          toast(ev.customIdentifier.label + ': Too long (max 200 chars)', 'error');
          return;
        }
        response[ev.customIdentifier.label] = idVal;
      }

      fields.forEach((f, i) => {
        if (hasError) return;
        let val = (formData.get('field_' + i) || '').trim();
        if (val.length > 1000) { toast(f.name + ': Input too long (max 1000 chars)', 'error'); hasError = true; return; }
        if (f.type === 'email') {
          const v = Storage.validate(val, 'email');
          if (!v.valid) { toast(f.name + ': ' + v.msg, 'error'); hasError = true; return; }
        }
        if (f.type === 'phone') {
          const v = Storage.validate(val, 'phone');
          if (!v.valid) { toast(f.name + ': ' + v.msg, 'error'); hasError = true; return; }
        }
        if (f.type === 'select' && f.options?.length) {
          if (!f.options.includes(val)) { toast(f.name + ': Invalid selection', 'error'); hasError = true; return; }
        }
        response[f.name] = val;
      });

      if (hasError) return;

      Storage.addResponse(eventId, response);

      // Show loading state on button
      const submitBtn = document.getElementById('submit-btn');
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px"></span>Submitting…';
      }

      setTimeout(() => {
        // Show success
        document.querySelector('.card').style.display = 'none';
        const successDiv = document.getElementById('form-success');
        successDiv.style.display = 'block';

        // Fix #12: scroll to top so success is visible
        document.getElementById('form-page').scrollIntoView({ behavior: 'smooth', block: 'start' });

        // Echo identifier in success message
        if (ev.customIdentifier?.label && response[ev.customIdentifier.label]) {
          const echo = document.getElementById('success-id-echo');
          if (echo) echo.textContent = ev.customIdentifier.label + ': ' + response[ev.customIdentifier.label];
        }

        toast('Registered successfully!', 'success');
      }, 400);
    }

    function resetForm() {
      document.getElementById('attendee-form')?.reset();
      document.querySelector('.card').style.display = 'block';
      document.getElementById('form-success').style.display = 'none';
    }
  </script>
</body>
</html>
